<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mistral Vision API - Skin Disease Analysis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        
        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .upload-area:hover {
            background: #f5f5f5;
            border-color: #764ba2;
        }
        
        .upload-area.dragover {
            background: #ede7f6;
            border-color: #764ba2;
        }
        
        .upload-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
            width: 100%;
        }
        
        .button:hover {
            background: #764ba2;
        }
        
        .button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .results {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        
        .result-item {
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid #eee;
        }
        
        .result-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .result-label {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .result-value {
            color: #666;
            font-size: 0.95em;
        }
        
        .confidence-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 5px;
        }
        
        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }
        
        .image-preview {
            width: 100%;
            border-radius: 8px;
            margin-top: 15px;
            max-height: 300px;
            object-fit: cover;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
        }
        
        .success {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }
        
        .info-box {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 6px;
        }
        
        .info-box-title {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
            font-size: 0.9em;
        }
        
        .info-box-value {
            color: #333;
            font-size: 1.1em;
        }
        
        .tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab-button {
            background: #f5f5f5;
            border: 2px solid transparent;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            color: #666;
            transition: all 0.3s;
        }
        
        .tab-button.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .recommendations-list {
            list-style: none;
        }
        
        .recommendations-list li {
            padding: 8px 0;
            padding-left: 25px;
            position: relative;
            color: #666;
        }
        
        .recommendations-list li:before {
            content: "→";
            position: absolute;
            left: 0;
            color: #667eea;
            font-weight: bold;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .button-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏥 Skin Disease Analysis</h1>
            <p class="subtitle">Using Mistral Vision API for Accurate AI Detection</p>
        </header>
        
        <div class="main-content">
            <!-- Upload Section -->
            <div class="card">
                <h2>📤 Upload Image</h2>
                
                <div class="tabs">
                    <button class="tab-button active" onclick="switchMode('single')">Single Image</button>
                    <button class="tab-button" onclick="switchMode('batch')">Batch Analysis</button>
                </div>
                
                <div id="single-mode">
                    <div class="upload-area" id="dropZone">
                        <div class="upload-icon">📷</div>
                        <p><strong>Drag image here or click to browse</strong></p>
                        <p style="font-size: 0.9em; color: #999; margin-top: 5px;">PNG, JPG, GIF, BMP supported</p>
                    </div>
                    <input type="file" id="imageInput" accept="image/*">
                    
                    <div class="button-group">
                        <button class="button" onclick="analyzeMistral()">🤖 Analyze with Mistral</button>
                        <button class="button" onclick="analyzeStandard()">📊 Standard Analysis</button>
                    </div>
                </div>
                
                <div id="batch-mode" style="display: none;">
                    <div class="upload-area" id="batchDropZone">
                        <div class="upload-icon">📁</div>
                        <p><strong>Drag multiple images here or click to browse</strong></p>
                        <p style="font-size: 0.9em; color: #999; margin-top: 5px;">Process multiple images at once</p>
                    </div>
                    <input type="file" id="batchInput" accept="image/*" multiple>
                    <button class="button" onclick="analyzeBatch()">🚀 Batch Analysis</button>
                </div>
            </div>
            
            <!-- Results Section -->
            <div class="card" id="resultsCard" style="display: none;">
                <h2>📋 Analysis Results</h2>
                <div id="results"></div>
            </div>
        </div>
        
        <!-- Detailed Results -->
        <div id="detailedResults" style="display: none;">
            <div class="results">
                <h2 style="color: #667eea; margin-bottom: 20px;">Detailed Analysis</h2>
                <div id="detailedContent"></div>
            </div>
        </div>
    </div>
    
    <script>
        let selectedFile = null;
        let selectedFiles = [];
        let currentMode = 'single';
        
        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('single-mode').style.display = mode === 'single' ? 'block' : 'none';
            document.getElementById('batch-mode').style.display = mode === 'batch' ? 'block' : 'none';
            
            // Update tab buttons
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }
        
        // Single file upload
        const dropZone = document.getElementById('dropZone');
        const imageInput = document.getElementById('imageInput');
        
        dropZone.addEventListener('click', () => imageInput.click());
        dropZone.addEventListener('dragover', e => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            selectedFile = e.dataTransfer.files[0];
            updateDropZoneText();
        });
        
        imageInput.addEventListener('change', e => {
            selectedFile = e.target.files[0];
            updateDropZoneText();
        });
        
        function updateDropZoneText() {
            if (selectedFile) {
                dropZone.innerHTML = `<div class="upload-icon">✅</div><p><strong>${selectedFile.name}</strong></p><p style="font-size: 0.9em; color: #999; margin-top: 5px;">${(selectedFile.size / 1024).toFixed(2)} KB</p>`;
            }
        }
        
        // Batch file upload
        const batchDropZone = document.getElementById('batchDropZone');
        const batchInput = document.getElementById('batchInput');
        
        batchDropZone.addEventListener('click', () => batchInput.click());
        batchDropZone.addEventListener('dragover', e => {
            e.preventDefault();
            batchDropZone.classList.add('dragover');
        });
        batchDropZone.addEventListener('dragleave', () => {
            batchDropZone.classList.remove('dragover');
        });
        batchDropZone.addEventListener('drop', e => {
            e.preventDefault();
            batchDropZone.classList.remove('dragover');
            selectedFiles = Array.from(e.dataTransfer.files);
            updateBatchText();
        });
        
        batchInput.addEventListener('change', e => {
            selectedFiles = Array.from(e.target.files);
            updateBatchText();
        });
        
        function updateBatchText() {
            if (selectedFiles.length > 0) {
                const totalSize = selectedFiles.reduce((sum, f) => sum + f.size, 0);
                batchDropZone.innerHTML = `<div class="upload-icon">✅</div><p><strong>${selectedFiles.length} images selected</strong></p><p style="font-size: 0.9em; color: #999; margin-top: 5px;">${(totalSize / 1024).toFixed(2)} KB total</p>`;
            }
        }
        
        function showResults(html) {
            const resultsCard = document.getElementById('resultsCard');
            const results = document.getElementById('results');
            results.innerHTML = html;
            resultsCard.style.display = 'block';
            resultsCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        
        function showLoading() {
            showResults('<div class="loading"><div class="spinner"></div><p>Analyzing image...</p></div>');
        }
        
        function showError(error) {
            showResults(`<div class="error"><strong>Error:</strong> ${error}</div>`);
        }
        
        async function analyzeMistral() {
            if (!selectedFile) {
                showError('Please select an image first');
                return;
            }
            
            showLoading();
            
            const formData = new FormData();
            formData.append('file', selectedFile);
            
            try {
                const response = await fetch('/mistral-analyze', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    displayMistralResults(data);
                } else {
                    showError(data.error || 'Analysis failed');
                }
            } catch (error) {
                showError('Network error: ' + error.message);
            }
        }
        
        async function analyzeStandard() {
            if (!selectedFile) {
                showError('Please select an image first');
                return;
            }
            
            showLoading();
            
            const formData = new FormData();
            formData.append('file', selectedFile);
            
            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (!data.error) {
                    displayStandardResults(data);
                } else {
                    showError(data.error || 'Analysis failed');
                }
            } catch (error) {
                showError('Network error: ' + error.message);
            }
        }
        
        async function analyzeBatch() {
            if (selectedFiles.length === 0) {
                showError('Please select images first');
                return;
            }
            
            showLoading();
            
            const formData = new FormData();
            selectedFiles.forEach(file => {
                formData.append('files', file);
            });
            
            try {
                const response = await fetch('/mistral-batch', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                displayBatchResults(data);
            } catch (error) {
                showError('Network error: ' + error.message);
            }
        }
        
        function displayMistralResults(data) {
            const analysis = data.analysis || {};
            const confidence = data.accuracy_confidence || 0;
            
            let html = `<div class="success"><strong>✅ Analysis Complete</strong> - Mistral Vision API</div>`;
            
            html += `
                <div class="result-item">
                    <div class="result-label">Disease/Condition</div>
                    <div class="result-value">${analysis.disease || 'N/A'}</div>
                </div>
                
                <div class="result-item">
                    <div class="result-label">Confidence Level</div>
                    <div class="result-value">${confidence.toFixed(1)}%</div>
                    <div class="confidence-bar">
                        <div class="confidence-fill" style="width: ${confidence}%"></div>
                    </div>
                </div>
                
                <div class="result-item">
                    <div class="result-label">Severity</div>
                    <div class="result-value">${analysis.severity || 'N/A'}</div>
                </div>
            `;
            
            if (data.preview) {
                html += `<img src="${data.preview}" class="image-preview" alt="Uploaded image">`;
            }
            
            if (analysis.observations && analysis.observations.length > 0) {
                html += `
                    <div class="result-item">
                        <div class="result-label">Key Observations</div>
                        <ul class="recommendations-list">
                            ${analysis.observations.slice(0, 3).map(obs => `<li>${obs}</li>`).join('')}
                        </ul>
                    </div>
                `;
            }
            
            if (analysis.recommendations && analysis.recommendations.length > 0) {
                html += `
                    <div class="result-item">
                        <div class="result-label">Recommendations</div>
                        <ul class="recommendations-list">
                            ${analysis.recommendations.slice(0, 3).map(rec => `<li>${rec}</li>`).join('')}
                        </ul>
                    </div>
                `;
            }
            
            showResults(html);
        }
        
        function displayStandardResults(data) {
            let html = `<div class="success"><strong>✅ Analysis Complete</strong> - ${data.method}</div>`;
            
            html += `
                <div class="result-item">
                    <div class="result-label">Disease/Condition</div>
                    <div class="result-value">${data.disease || 'N/A'}</div>
                </div>
                
                <div class="result-item">
                    <div class="result-label">Confidence Level</div>
                    <div class="result-value">${data.confidence || 0}%</div>
                    <div class="confidence-bar">
                        <div class="confidence-fill" style="width: ${data.confidence || 0}%"></div>
                    </div>
                </div>
            `;
            
            if (data.preview) {
                html += `<img src="${data.preview}" class="image-preview" alt="Uploaded image">`;
            }
            
            showResults(html);
        }
        
        function displayBatchResults(data) {
            let html = `<div class="success"><strong>✅ Batch Analysis Complete</strong></div>`;
            html += `
                <div class="info-grid">
                    <div class="info-box">
                        <div class="info-box-title">Total Images</div>
                        <div class="info-box-value">${data.total_images}</div>
                    </div>
                    <div class="info-box">
                        <div class="info-box-title">Successful</div>
                        <div class="info-box-value">${data.successful}</div>
                    </div>
                    <div class="info-box">
                        <div class="info-box-title">Failed</div>
                        <div class="info-box-value">${data.failed}</div>
                    </div>
                    <div class="info-box">
                        <div class="info-box-title">Avg Confidence</div>
                        <div class="info-box-value">${data.average_confidence.toFixed(1)}%</div>
                    </div>
                </div>
            `;
            
            showResults(html);
        }
    </script>
</body>
</html>
